services:
  api:
    container_name: lockin-api
    build:
      context: ../apps/api
      dockerfile: Dockerfile
    ports:
      - "4000:4000"
    volumes:
      - ../apps/api:/app
      - api_node_modules:/app/node_modules
    # env_file:
    #   - ../.env
    # depends_on:
    #   - mongo
    command: npm run dev

  # mongo:
  #   container_name: lockin-mongo
  #   image: mongo:7
  #   ports:
  #     - "27017:27017"
  #   volumes:
  #     - mongo_data:/data/db

  mobile:
    container_name: lockin-mobile
    build:
      context: ../apps/mobile
      dockerfile: Dockerfile
    ports:
      - "8081:8081"
    volumes:
      - ../apps/mobile:/app
      - /app/node_modules
    environment:
      - EXPO_DEVTOOLS_LISTEN_ADDRESS=0.0.0.0
    command: npm run start

volumes:
  api_node_modules:
  mobile_node_modules:
  mongo_data: